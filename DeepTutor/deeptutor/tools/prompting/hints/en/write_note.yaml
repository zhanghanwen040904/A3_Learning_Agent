short_description: "Save a new notebook record OR edit an existing one. mode='append' (new) or 'edit' (patch existing)."
when_to_use: "append: user explicitly asked to save, or the turn produced a self-contained walkthrough worth keeping. edit: user asked to revise / extend / correct a record they previously saved. For edit, always run `list_notebook` first so you have the right record_id."
input_format: "append: {\"mode\": \"append\", \"notebook_id\": \"...\", \"title\": \"...\", \"turns_to_include\": \"3\" | \"all\", \"note\": \"optional\"}. edit: {\"mode\": \"edit\", \"notebook_id\": \"...\", \"record_id\": \"...\", \"title\": optional, \"content\": optional, \"note\": optional}. In append mode you do NOT write the body — the tool inserts the real chat transcript itself; only pass `content` when you intentionally want to save an agent-authored summary."
guideline: "Default `turns_to_include` is 3. Use 'all' when the user says 'save this whole conversation'. Never invent notebook ids or record ids — the schema enum lists valid notebook_ids, and `list_notebook` gives you record ids. The optional `note` is short commentary ('why this matters', 'context to remember'), not the body."
note: "Auto-mounted only when the user has at least one notebook. On success the result includes the destination notebook name + record id — surface those to the user as confirmation. For edits the result confirms which field(s) changed."
phase: "synthesis"
