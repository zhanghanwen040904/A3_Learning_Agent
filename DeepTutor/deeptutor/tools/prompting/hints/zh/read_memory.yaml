short_description: "读取该用户的持久化记忆：近期学习总结、用户画像、知识 scope、显式偏好。"
when_to_use: "当回答的语气、深度、举例或推荐可以**针对该用户**调整时调用。纯事实/计算/翻译类问题不调。"
input_format: "无参数。返回拼接后的四份 L3 文档。"
guideline: "每个 turn 最多调一次。读完用记忆来影响**怎么解释**、**举什么例子**、**问什么后续问题**——不要把记忆原文当事实抄给用户。"
note: "用户还没建立记忆时返回 `(No memory available...)` 提示，按通用问题处理。"
phase: "exploration"
