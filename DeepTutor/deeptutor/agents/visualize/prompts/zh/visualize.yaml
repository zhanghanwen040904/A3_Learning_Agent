  repair_skipped_error: "跳过修复——直接使用草稿。"
  html_invalid_fallback: "HTML 未通过校验；使用兜底模板。"
  manim_code_prepared: "Manim 代码已准备好。"
  manim_rendering: "正在渲染 {mode}，质量={quality}。"
  manim_retry: "重试 {attempt}：{error}"
